site_name: CMS ICD
site_description: Version-aware structured access to official CMS ICD-10 materials
site_url: https://ipolharvard.github.io/cms-id/
repo_url: https://github.com/ipolharvard/cms-id
repo_name: ipolharvard/cms-id
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - User guide:
      - Getting started: guide/getting-started.md
      - Releases and caching: guide/releases-and-caching.md
      - Local and custom sources: guide/local-sources.md
  - API reference:
      - Knowledge bases: reference/knowledge-base.md
      - Records: reference/models.md
      - Stores: reference/stores.md
      - Sources: reference/sources.md
      - Exceptions: reference/exceptions.md
  - Testing CMS compatibility: testing.md
  - Development: development.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            heading_level: 2
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_bases: false
            show_root_heading: true
            show_signature_annotations: true
            show_source: true
            signature_crossrefs: true

watch:
  - src/cms_icd
