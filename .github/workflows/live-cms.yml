name: Live CMS integration

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 1 * *"

jobs:
  live-cms:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/cache@v4
        with:
          path: ~/.cache/cms-icd
          key: cms-icd-live-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - run: uv pip install --system -e ".[dev]"
      - run: pytest -q --tb=line -m live_cms tests/live

